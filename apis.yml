description: >-
  The Bureau of Engraving and Printing (BEP) designs and produces a variety of
  security products for the United States government, most notably Federal
  Reserve Notes (paper currency). The BEP redeems severely damaged Federal
  Reserve notes as a free public service and offers a U.S. Currency Reader
  Program.
